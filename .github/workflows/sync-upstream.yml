name: Sync Upstream

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream and merge
        run: |
          git remote add upstream https://github.com/FoundationAgents/OpenManus.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || echo "Nothing to merge or conflict"

      - name: Push
        run: git push origin main
